<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Chat</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Welcome State -->
  <div id="welcomeState" class="welcome-state">
    <div class="welcome-controls">
      <button id="languageToggleBtn" class="lang-toggle-btn" title="Response language: English">EN</button>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="page-info">
      <div class="page-info-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="page-info-text">
        <div id="pageTitle" class="page-title">Loading page info...</div>
<!--        <div id="pageUrl" class="page-url"></div>-->
        <div id="pageWordCount" class="page-word-count"></div>
      </div>
    </div>

    <div id="actionCards" class="action-cards"></div>
  </div>

  <!-- Chat State -->
  <div id="chatState" class="chat-state hidden">
    <div class="messages-wrap">
      <button id="clearChatBtn" class="clear-chat-btn" title="Clear chat">clear</button>
      <div id="historyBar" class="history-bar hidden">
        <div id="historyDropdown" class="history-dropdown menu-closed">
          <button id="historyToggleBtn" class="history-toggle-btn" title="Chat requests history" aria-label="Chat requests history"></button>
          <div id="historyMenu" class="history-menu hidden"></div>
        </div>
      </div>
      <div id="messages" class="messages"></div>
      <button id="scrollToBottomBtn" class="scroll-to-bottom-btn hidden" title="Scroll to latest" aria-label="Scroll to latest">
        ↓
      </button>
    </div>
    <div id="actionBar" class="action-bar"></div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <label for="userInput"></label><textarea id="userInput" placeholder="Ask about this page..." rows="1"></textarea>
      <button id="sendBtn" class="send-btn" title="Send">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button id="stopBtn" class="stop-btn hidden" title="Stop">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">Reading page content...</div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
